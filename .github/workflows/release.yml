name: Release

# Every push to main: run tests, then publish a new patch version — Docker image
# (X.Y.Z + latest) to ghcr.io and a GitHub Release with notes + the native binary.
on:
  push:
    branches: [main]

permissions:
  contents: write   # create the GitHub Release + tag
  packages: write   # push the image to GitHub Container Registry (ghcr.io)

# Serialize releases so concurrent pushes don't race on version computation.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21 (Liberica)
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: '21'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Test
        run: ./gradlew test

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full tag history to compute the next version

      - name: Compute next version (single incrementing integer)
        run: |
          git fetch --tags --force
          # Only consider plain integer tags (vN); ignore any older semver-style tags.
          latest="$(git tag -l 'v*' | grep -E '^v[0-9]+$' | sort -V | tail -n1)"
          if [ -z "$latest" ]; then
            next=1
          else
            next=$(( ${latest#v} + 1 ))
          fi
          echo "VERSION=$next" >> "$GITHUB_ENV"
          echo "TAG=v$next" >> "$GITHUB_ENV"
          echo "Releasing v$next"

      # ghcr image names must be lowercase; GITHUB_REPOSITORY may contain uppercase.
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The multi-stage Dockerfile builds the musl native binary inside the BellSoft NIK
      # image and ships it on Alpaquita. Heavy (several minutes); cached across runs.
      - name: Build and push image (version + latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract native binary from the image
        run: |
          cid="$(docker create "${IMAGE}:${VERSION}")"
          docker cp "$cid:/usr/local/bin/cfpbot" ./cfpbot-linux-x86_64
          docker rm "$cid"
          chmod +x ./cfpbot-linux-x86_64

      # Creates tag v$VERSION at this commit, generates notes, attaches the binary.
      # (This tag does NOT retrigger the workflow — it only runs on push to main.)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          generate_release_notes: true
          files: cfpbot-linux-x86_64
          body: |
            Container image: `${{ env.IMAGE }}:${{ env.VERSION }}` (also tagged `latest`)

            ```bash
            docker run --rm --env-file .env --user "$(id -u):$(id -g)" \
              -v "$PWD/data:/data" ${{ env.IMAGE }}:${{ env.VERSION }}
            ```
