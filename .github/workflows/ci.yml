name: CI

# Pull-request feedback. Pushes to main are handled by the Release workflow,
# which re-runs the tests before publishing.
on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Liberica, matches the project stack)
        uses: actions/setup-java@v5
        with:
          distribution: liberica
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test
        run: ./gradlew test
